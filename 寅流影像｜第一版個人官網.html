      background: #000;
      color: #fff;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

      height: 100vh;

    .card {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3rem 1rem;

    創造能被觀看、被記住的畫面。
  </p>
